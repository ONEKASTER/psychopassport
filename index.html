<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПСИХОПАСПОРТ — Клинический тест профиля личности</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #060608;
            color: #c8c8d8;
            line-height: 1.6;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #c8ff00, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 1.3rem;
            color: rgba(200, 200, 220, 0.8);
            margin-bottom: 40px;
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }
        
        .btn {
            padding: 16px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            letter-spacing: 2px;
        }
        
        .btn-primary {
            background: #c8ff00;
            color: #000;
        }
        
        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(200, 255, 0, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: rgba(200, 255, 0, 0.1);
            color: #c8ff00;
            border: 2px solid #c8ff00;
        }
        
        .btn-secondary:hover {
            background: rgba(200, 255, 0, 0.2);
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid rgba(200, 255, 0, 0.2);
        }
        
        .feature h3 {
            color: #c8ff00;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        
        .feature p {
            color: rgba(200, 200, 220, 0.7);
            font-size: 0.95rem;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
            text-align: center;
        }
        
        .stat {
            background: rgba(200, 255, 0, 0.1);
            padding: 20px;
            border-radius: 8px;
        }
        
        .stat-number {
            font-size: 2.5rem;
            color: #c8ff00;
            font-weight: bold;
        }
        
        .stat-label {
            color: rgba(200, 200, 220, 0.7);
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        .docs {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid rgba(200, 255, 0, 0.2);
            margin-bottom: 60px;
        }
        
        .docs h2 {
            color: #c8ff00;
            margin-bottom: 20px;
        }
        
        .docs-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .docs-item {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            border-left: 3px solid #c8ff00;
        }
        
        .docs-item a {
            color: #c8ff00;
            text-decoration: none;
            font-weight: 500;
        }
        
        .docs-item a:hover {
            text-decoration: underline;
        }
        
        .docs-item p {
            color: rgba(200, 200, 220, 0.6);
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        footer {
            text-align: center;
            color: rgba(200, 200, 220, 0.5);
            border-top: 1px solid rgba(200, 255, 0, 0.2);
            padding-top: 30px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 ПСИХОПАСПОРТ</h1>
        <p class="subtitle">Клинический профиль личности на основе MMPI-2</p>
        
        <div class="buttons">
            <a href="psychopassport_final_PSYPASS.html" class="btn btn-primary">🚀 Пройти тест</a>
                </div>
            </div>
        </div>
        
        <footer>
            <p>ПСИХОПАСПОРТ © 2026 | Клинический тест профиля личности</p>
            <p style="margin-top: 10px; font-size: 0.85rem;">
                <a href="https://github.com" style="color: #c8ff00; text-decoration: none;">GitHub</a> • 
                <a href="https://telegram.org" style="color: #c8ff00; text-decoration: none;">Telegram</a> • 
                <a href="https://pages.github.com" style="color: #c8ff00; text-decoration: none;">GitHub Pages</a>
            </p>
        </footer>
    </div>
</body>
</html>
